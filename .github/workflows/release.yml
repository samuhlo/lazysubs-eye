name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Instala musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Compila binario estático
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Empaqueta
        run: |
          version="${GITHUB_REF_NAME#v}"
          dir="lazysubs-${version}-x86_64-linux-musl"
          mkdir "$dir"
          cp target/x86_64-unknown-linux-musl/release/lazysubs LICENSE README.md "$dir/"
          tar czf "$dir.tar.gz" "$dir"
          sha256sum "$dir.tar.gz" > "$dir.tar.gz.sha256"
      - name: Publica release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lazysubs-*-x86_64-linux-musl.tar.gz
            lazysubs-*-x86_64-linux-musl.tar.gz.sha256
          generate_release_notes: true
