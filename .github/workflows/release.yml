name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  issues: write
  checks: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Audit RustSec (obligatorio para RC y Stable)
        if: ${{ !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Verifica versión del tag
        run: bash scripts/verify-version.sh
      - name: Instala herramientas del artefacto
        run: sudo apt-get update && sudo apt-get install -y musl-tools jq
      - name: Compila binario estático
        run: cargo build --release --locked --target x86_64-unknown-linux-musl
      - name: Smoke tests del artefacto
        run: bash scripts/smoke-release.sh target/x86_64-unknown-linux-musl/release/lazysubs-eye
      - name: Empaqueta
        run: |
          version="${GITHUB_REF_NAME#v}"
          dir="lazysubs-eye-${version}-x86_64-linux-musl"
          mkdir "$dir"
          cp target/x86_64-unknown-linux-musl/release/lazysubs-eye LICENSE README.md "$dir/"
          tar czf "$dir.tar.gz" "$dir"
          sha256sum "$dir.tar.gz" > "$dir.tar.gz.sha256"
      - name: Publica release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lazysubs-eye-*-x86_64-linux-musl.tar.gz
            lazysubs-eye-*-x86_64-linux-musl.tar.gz.sha256
          generate_release_notes: true
